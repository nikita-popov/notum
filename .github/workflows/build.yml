name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download gradle-wrapper.jar
        run: |
          GRADLE_VERSION=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties \
            | sed 's/.*gradle-\(.*\)-bin.zip/\1/')
          echo "Gradle version: ${GRADLE_VERSION}"
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          chmod +x ./gradlew

      - name: Determine version
        id: version
        run: |
          if git describe --tags --exact-match HEAD 2>/dev/null; then
            VERSION=$(git describe --tags --exact-match HEAD | sed 's/^v//')
          else
            HASH=$(git rev-parse --short HEAD)
            VERSION="${HASH}-dev"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Build release APKs (per-ABI + universal)
        run: ./gradlew assembleRelease

      - name: Rename APKs with version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT_DIR="app/build/outputs/apk/release"
          for apk in "$OUTPUT_DIR"/*.apk; do
            base=$(basename "$apk" .apk)
            mv "$apk" "$OUTPUT_DIR/${base}-${VERSION}.apk"
          done
          ls -lh "$OUTPUT_DIR"

      - name: Upload APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: notum-${{ steps.version.outputs.version }}-apks
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "notum ${{ steps.version.outputs.version }}"
          body: |
            ## notum ${{ steps.version.outputs.version }}

            ### Скачать
            | Архитектура | Файл |
            |---|---|
            | ARM 64-bit (современные устройства) | `*-arm64-v8a-*.apk` |
            | ARM 32-bit (старые устройства)      | `*-armeabi-v7a-*.apk` |
            | x86_64 (эмулятор)                  | `*-x86_64-*.apk` |
            | Universal (все архитектуры)         | `*-universal-*.apk` |

            > Для большинства Android-устройств 2018+ подходит `arm64-v8a`.
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
